name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify CLI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --prefix packages/cli

      - name: CLI starts
        run: node packages/cli/src/index.js --help

      - name: Doctor report
        run: node packages/cli/src/index.js doctor --report || true
        # doctor exits 1 in CI because no scaffold exists here — this is expected.
        # The check validates that the doctor command itself runs without crashing.

  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --prefix packages/cli

      - name: ESLint
        run: npx --prefix packages/cli eslint packages/cli/src/ packages/cli/test/

      - name: Prettier
        run: npx --prefix packages/cli prettier --check packages/cli/src/ packages/cli/test/

      - name: Dependency audit
        run: npm audit --audit-level=moderate --prefix packages/cli

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --prefix packages/cli

      - name: Run unit tests
        run: npm run test:unit --prefix packages/cli

  drift-tracker-tests:
    name: Drift tracker tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run drift tracker tests
        run: node --test .github/drift-tracker/test/check-drift.test.mjs

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm install --prefix packages/cli

      - name: Run integration tests
        run: npm test --prefix packages/cli
