name: Discussion monitor

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 9 AM UTC
  workflow_dispatch:

permissions:
  issues: write
  discussions: read

jobs:
  check-unanswered:
    name: Find unanswered Q&A discussions
    runs-on: ubuntu-latest

    steps:
      - name: Close prior monitor issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo marcoguillermaz/claude-dev-kit \
            --label "discussions" \
            --state open \
            --json number -q '.[].number' | while read num; do
            gh issue close "$num" \
              --repo marcoguillermaz/claude-dev-kit \
              --comment "Superseded by new weekly scan."
          done

      - name: Query unanswered discussions
        id: query
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '14 days ago' '+%Y-%m-%dT%H:%M:%SZ')

          # Look up Q&A category ID dynamically
          QA_ID=$(gh api graphql -f query='
            { repository(owner:"marcoguillermaz", name:"claude-dev-kit") {
              discussionCategories(first:10) {
                nodes { id slug }
              }
            }}' --jq '.data.repository.discussionCategories.nodes[] | select(.slug == "q-a") | .id')

          if [ -z "$QA_ID" ]; then
            echo "Q&A category not found, skipping."
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULT=$(gh api graphql -f query='
            query($categoryId: ID!) {
              repository(owner:"marcoguillermaz", name:"claude-dev-kit") {
                discussions(
                  first: 50
                  categoryId: $categoryId
                  answered: false
                  orderBy: { field: CREATED_AT, direction: ASC }
                ) {
                  nodes {
                    number
                    title
                    url
                    createdAt
                    author { login }
                    comments { totalCount }
                  }
                }
              }
            }' -f categoryId="$QA_ID")

          UNANSWERED=$(echo "$RESULT" | jq --arg cutoff "$CUTOFF" '
            [.data.repository.discussions.nodes[]
             | select(.createdAt < $cutoff)]
          ')

          COUNT=$(echo "$UNANSWERED" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            {
              echo "body<<EOF"
              echo "## Unanswered Q&A Discussions (older than 14 days)"
              echo ""
              echo "| # | Title | Author | Created | Comments |"
              echo "|---|---|---|---|---|"
              echo "$UNANSWERED" | jq -r '.[] |
                "| [#\(.number)](\(.url)) | \(.title) | @\(.author.login) | \(.createdAt | split("T")[0]) | \(.comments.totalCount) |"'
              echo ""
              echo "---"
              echo "_Generated by discussion-monitor workflow. $(date -u '+%Y-%m-%d %H:%M UTC')_"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create summary issue
        if: steps.query.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo marcoguillermaz/claude-dev-kit \
            --title "Unanswered Q&A discussions — $(date -u '+%Y-%m-%d')" \
            --body "${{ steps.query.outputs.body }}" \
            --label "discussions"
